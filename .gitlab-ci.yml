variables:
  SECRET_DETECTION_ENABLED: "true"
  GITLAB_ADVANCED_SAST_ENABLED: "true"
  CI_APPLICATION_REPOSITORY: "$CI_REGISTRY_IMAGE"
  CI_APPLICATION_TAG: "latest"
  GHCR_IMAGE: "ghcr.io/patschi/akvatar"
  GITHUB_PROJECT_URL: "https://github.com/patschi/akvatar"

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Jobs/Container-Scanning.gitlab-ci.yml

# Ensure container scanning targets the image just built, not a potentially stale latest
container_scanning:
  needs:
    - push-container-gitlab

stages:
  - lint
  - build-container
  - test

lint-ruff:
  stage: lint
  image: python:3.13-slim@sha256:739e7213785e88c0f702dcdc12c0973afcbd606dbf021a589cab77d6b00b579d
  before_script:
    - pip install --quiet --root-user-action=ignore --upgrade pip
    - pip install --quiet --root-user-action=ignore ruff
  script:
    - ruff check *.py src/

# Push container to GitLab Container Registry
push-container-gitlab:
  stage: build-container
  image:
    name: martizih/kaniko:v1.26.6-debug@sha256:d2170bed1affc9d886853691c5ae7aa36163f2643de42693eb890bad8d1763ad
    entrypoint: [""]
  variables:
    FF_KANIKO_OCI_STAGES: 'true'
  before_script: []
  script:
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"},\"$(echo -n $CI_DEPENDENCY_PROXY_SERVER | awk -F[:] '{print $1}')\":{\"auth\":\"$(printf "%s:%s" ${CI_DEPENDENCY_PROXY_USER} "${CI_DEPENDENCY_PROXY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - >
      /kaniko/executor
      --cache=false
      --registry-mirror=mirror.gcr.io
      --compression=zstd
      --compression-level=1
      --compressed-caching=true
      --single-snapshot
      --annotation="org.opencontainers.image.title=$CI_PROJECT_NAME"
      --annotation="org.opencontainers.image.version=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
      --annotation="org.opencontainers.image.source=$CI_PROJECT_URL"
      --annotation="org.opencontainers.image.revision=$CI_COMMIT_SHA"
      --annotation="org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
      --annotation="org.opencontainers.image.description=$CI_PROJECT_DESCRIPTION"
      --annotation="org.opencontainers.image.licenses=GPLv3"
      --context="$CI_PROJECT_DIR"
      --dockerfile="$CI_PROJECT_DIR/Dockerfile"
      --destination="$CI_REGISTRY_IMAGE:dev"
  rules:
    - if: '$CI_PIPELINE_SOURCE != "merge_request_event"'
      when: always
    - when: never

