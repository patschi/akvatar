# Prevent duplicate pipelines when a branch push also has an open MR:
# run the MR pipeline, skip the redundant branch pipeline.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

variables:
  SECRET_DETECTION_ENABLED: "true"
  GITLAB_ADVANCED_SAST_ENABLED: "true"
  CI_APPLICATION_REPOSITORY: "$CI_REGISTRY_IMAGE"
  CI_APPLICATION_TAG: "dev"
  GHCR_IMAGE: "ghcr.io/patschi/akvatar"
  GITHUB_PROJECT_URL: "https://github.com/patschi/akvatar"
  # Exclude non-Python paths from SAST to reduce noise and scan time
  SAST_EXCLUDED_PATHS: "static, data, docs"
  # uv version used in all lint jobs. Renovate tracks this via PyPI and updates
  # it in the same PR as the matching COPY --from=ghcr.io/astral-sh/uv in Dockerfile.
  UV_VERSION: "0.11.6"
  # ruff version used in lint jobs. Renovate tracks this via PyPI.
  RUFF_VERSION: "0.15.11"

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Jobs/Container-Scanning.gitlab-ci.yml

# Ensure container scanning targets the image just built, not a potentially stale latest.
# optional: true allows the job to run on scheduled pipelines even when
# push-container-gitlab is skipped (it will scan the existing :dev image).
container_scanning:
  needs:
    - job: push-container-gitlab
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: '$CI_PIPELINE_SOURCE != "merge_request_event"'
      changes:
        - "**/*.py"
        - "Dockerfile"
        - "pyproject.toml"
        - "uv.lock"
        - ".gitlab-ci.yml"
        - "static/**"
        - "src/**"
      when: always
    - when: never

# Run dependency scanning on scheduled pipelines in addition to pyproject.toml/uv.lock changes
gemnasium-python-dependency_scanning:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: '$CI_PIPELINE_SOURCE != "merge_request_event"'
      changes:
        - "pyproject.toml"
        - "uv.lock"
        - ".gitlab-ci.yml"
      when: always
    - when: never

stages:
  - lint
  - build-container
  - test

# Shared base for all lint jobs: pinned Python image, uv install, and uv cache.
# Child jobs reference this before_script with !reference so they can append
# their own steps without losing the uv bootstrap.
# UV_CACHE_DIR points uv to the GitLab CI cache directory so tool downloads
# survive between pipeline runs. UV_NO_PROGRESS suppresses the progress bar.
.uv-base:
  image: python:3.13-slim-trixie@sha256:d168b8d9eb761f4d3fe305ebd04aeb7e7f2de0297cec5fb2f8f6403244621664
  variables:
    UV_CACHE_DIR: .uv-cache
    UV_NO_PROGRESS: "1"
  cache:
    key: uv-$CI_COMMIT_REF_SLUG
    paths:
      - .uv-cache/
  before_script:
    - pip install --quiet --root-user-action=ignore uv==${UV_VERSION} --cache-dir .uv-cache

# Shared base for ruff lint jobs: extends uv-base and declares the shared trigger
# rules so check and format stay in sync without repetition.
# ruff is invoked via uvx (uv's tool executor) - no explicit install step needed.
# uvx caches the tool in UV_CACHE_DIR so repeated calls across jobs are fast.
.ruff-base:
  extends: .uv-base
  stage: lint
  interruptible: true
  before_script:
    - !reference [.uv-base, before_script]
  rules:
    - changes:
        - "**/*.py"
        - "pyproject.toml"
        - ".gitlab-ci.yml"
      when: always
    - when: never

lint-ruff-check:
  extends: .ruff-base
  script:
    # Generate GitLab Code Quality report (inline MR diff annotations)
    - uvx ruff@${RUFF_VERSION} check --output-format=gitlab *.py src/ > ruff-report.json || true
    # This is the call that actually fails the job on lint errors
    - uvx ruff@${RUFF_VERSION} check *.py src/
  artifacts:
    reports:
      codequality: ruff-report.json
    when: always

lint-ruff-format:
  extends: .ruff-base
  script:
    - uvx ruff@${RUFF_VERSION} format --check *.py src/

# Audits pinned deps against OSV/PyPI Advisory databases.
# Runs on pyproject.toml/uv.lock changes and on scheduled pipelines (nightly CVE discovery).
# Configure the schedule in GitLab UI -> CI/CD -> Schedules.
# uv audit reads uv.lock directly - no separate resolution step needed.
lint-uv-audit:
  extends: .uv-base
  stage: lint
  interruptible: true
  before_script:
    - !reference [.uv-base, before_script]
  script:
    - uv audit
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - unknown_failure
  rules:
    # Always run on scheduled pipelines (e.g. nightly) for CVE discovery
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - changes:
        - "pyproject.toml"
        - "uv.lock"
        - ".gitlab-ci.yml"
      when: always
    - when: never

# Push container to GitLab Container Registry
push-container-gitlab:
  stage: build-container
  interruptible: true
  image:
    name: martizih/kaniko:v1.27.2-debug@sha256:e6758dd08d8fa31707ace2cb72d3ba437667fe5c709101e48223f655b58b27bd
    entrypoint: [""]
  variables:
    FF_KANIKO_OCI_STAGES: 'true'
  before_script: []
  script:
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"},\"$(echo -n $CI_DEPENDENCY_PROXY_SERVER | awk -F[:] '{print $1}')\":{\"auth\":\"$(printf "%s:%s" ${CI_DEPENDENCY_PROXY_USER} "${CI_DEPENDENCY_PROXY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    # Parse APP_BASE_VERSION from __init__.py - the single source of truth for the version number.
    # awk splits on " and prints the second field from the matching line, e.g. "0.1.0" -> 0.1.0.
    - BASE_VERSION=$(awk -F'"' '/^APP_BASE_VERSION[[:space:]]*=/{print $2}' src/__init__.py)
    - >
      /kaniko/executor
      --cache=false
      --registry-mirror=mirror.gcr.io
      --compression=zstd
      --compression-level=1
      --compressed-caching=true
      --single-snapshot
      --annotation="org.opencontainers.image.title=$CI_PROJECT_NAME"
      --annotation="org.opencontainers.image.version=${BASE_VERSION}+${CI_COMMIT_SHORT_SHA}"
      --annotation="org.opencontainers.image.source=$CI_PROJECT_URL"
      --annotation="org.opencontainers.image.revision=$CI_COMMIT_SHA"
      --annotation="org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
      --annotation="org.opencontainers.image.description=$CI_PROJECT_DESCRIPTION"
      --annotation="org.opencontainers.image.licenses=GPLv3"
      --build-arg="BASE_VERSION=${BASE_VERSION}"
      --build-arg="GIT_HASH=${CI_COMMIT_SHORT_SHA}"
      --context="$CI_PROJECT_DIR"
      --dockerfile="$CI_PROJECT_DIR/Dockerfile"
      --destination="$CI_REGISTRY_IMAGE:$CI_APPLICATION_TAG"
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - unknown_failure
  rules:
    - if: '$CI_PIPELINE_SOURCE != "merge_request_event"'
      changes:
        - "**/*.py"
        - "Dockerfile"
        - "pyproject.toml"
        - "uv.lock"
        - ".gitlab-ci.yml"
        - "static/**"
        - "src/**"
      when: always
    - when: never

