<!DOCTYPE html>
<html lang="{{ lang }}">
{% with page_title=t('title_signin') %}
  {% include 'partials/head.html' %}
{% endwith %}
<body>

  {% include 'partials/navbar.html' %}

  <!-- ================================================================== -->
  <!-- Centred login card                                                  -->
  <!-- ================================================================== -->
  <main class="container container--narrow">
    <div class="card login-card">
      <!-- Application logo with page-type overlay badge -->
      <div class="login-hero-wrapper">
        <img class="login-hero" src="{{ url_for('static', filename='logo.svg') }}" alt="{{ brand_name }}" />
        <span class="login-hero-badge">{{ t('title_signin') }}</span>
      </div>

      <h1>{{ t('login_heading') }}</h1>
      <p class="subtitle">{{ t('login_subtitle') }}</p>

      {% if error_key %}
        <p class="result-error">{{ t('login_error_' + error_key) }}</p>
      {% endif %}

      <a href="{{ url_for('auth.login') }}" class="btn btn-login">
        {{ t('login_button') }}
      </a>
    </div>
  </main>

  <script src="{{ url_for('static', filename='settings.js') }}"></script>
</body>
</html>
