<!-- Settings overlay (fixed fullscreen backdrop with centered panel) -->
<div class="settings-overlay hidden" id="settingsOverlay">
  <div class="settings-panel">

    <!-- Header with title and close button -->
    <div class="settings-header">
      <span class="settings-title">{{ t('settings_title') }}</span>
      <button class="settings-close" type="button" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 5l10 10M15 5L5 15"/></svg>
      </button>
    </div>

    <!-- Theme selection: Light / Dark / Auto (follows system) -->
    <div class="settings-group">
      <span class="settings-label">{{ t('settings_theme') }}</span>
      <div class="settings-options">
        <button class="btn settings-option" data-theme-value="light" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          {{ t('settings_light') }}
        </button>
        <button class="btn settings-option" data-theme-value="dark" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          {{ t('settings_dark') }}
        </button>
        <button class="btn settings-option" data-theme-value="auto" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          {{ t('settings_auto') }}
        </button>
      </div>
    </div>

    <!-- Language selection: English / Deutsch -->
    <div class="settings-group">
      <span class="settings-label">{{ t('settings_language') }}</span>
      <div class="settings-options">
        <button class="btn settings-option" data-locale="en_US" type="button">
          <span class="settings-badge">EN</span> English
        </button>
        <button class="btn settings-option" data-locale="de_DE" type="button">
          <span class="settings-badge">DE</span> Deutsch
        </button>
      </div>
    </div>

    <!-- Footer with reset button and version info -->
    <div class="settings-footer">
      <button class="settings-reset" id="settingsReset" type="button">
        {{ t('settings_reset') }}
      </button>
      <span class="settings-version">v{{ app_version }}</span>
    </div>
  </div>
</div>
