<!-- Shared <head> section - included by all page templates -->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="darkreader-lock" />
  <meta name="color-scheme" content="dark light" />
  <meta name="robots" content="noindex, nofollow" />
  <title>{{ brand_name }} - {{ page_title }}</title>

  <!-- Open Graph / social preview -->
  <meta property="og:type"         content="website" />
  <meta property="og:site_name"    content="{{ brand_name }}" />
  <meta property="og:title"        content="{{ brand_name }} – {{ page_title }}" />
  <meta property="og:description"  content="Manage your profile picture." />
  <meta property="og:url"          content="{{ request.url }}" />
  <meta property="og:image"        content="{{ url_for('static', filename='images/favicon-192.png', _external=True) }}" />
  <meta property="og:image:width"  content="192" />
  <meta property="og:image:height" content="192" />

  <!--
    Theme initialization - runs before first paint to prevent a flash of
    wrong colors. Reads the "theme" cookie and applies the correct
    data-theme attribute immediately.
  -->
  <script nonce="{{ csp_nonce() }}">
    (function () {
      // Read the saved theme preference from cookie
      let cookieMatch    = document.cookie.match(/(?:^|; )theme=([^;]*)/);
      let savedPreference = cookieMatch ? cookieMatch[1] : null;

      // Explicit light/dark wins; otherwise follow the OS preference
      let resolvedTheme = (savedPreference === "light" || savedPreference === "dark")
        ? savedPreference
        : window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";

      document.documentElement.setAttribute("data-theme", resolvedTheme);

      // Prevent Dark Reader browser extension from overriding our theme
      document.documentElement.setAttribute("data-darkreader-mode", "disabled");
    })();
  </script>

  {% if sentry_browser %}
  <!-- Sentry Browser SDK - loaded from the self-hosted Sentry installation -->
  <script src="{{ sentry_browser.js_sdk_url }}" nonce="{{ csp_nonce() }}" crossorigin="anonymous"></script>
  <script nonce="{{ csp_nonce() }}">
    if (typeof Sentry !== "undefined") {
      Sentry.init({
        dsn: {{ sentry_browser.dsn | tojson }},
        environment: {{ sentry_browser.environment | tojson }},
        release: {{ sentry_browser.release | tojson }},
        sampleRate: {{ sentry_browser.sample_rate }},
        tracesSampleRate: {{ sentry_browser.traces_sample_rate }},
        {% if sentry_browser.tunnel_enabled %}tunnel: {{ url_for('sentry.api_sentry_tunnel') | tojson }},{% endif %}
      });
    }
  </script>
  {% endif %}

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}" />
  <link rel="icon" type="image/x-icon"  href="{{ url_for('static', filename='images/favicon.ico') }}" />
  <link rel="apple-touch-icon"          href="{{ url_for('static', filename='images/favicon-192.png') }}" />

  <!-- Optional page-specific head content (e.g. Cropper.js on the dashboard) -->
  {% if head_extra %}
    {{ head_extra | safe }}
  {% endif %}

  <!-- App styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% if custom_css %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.custom.css') }}" />
  {% endif %}

  <!-- Common utilities - loaded in <head> so they are available on every page before any body script runs -->
  <script src="{{ url_for('static', filename='js/common-utils.js') }}"></script>
</head>
