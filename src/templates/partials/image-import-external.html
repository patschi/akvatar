<!-- Import dialog (modal overlay for Gravatar / URL import) -->
<div class="dialog-overlay hidden" id="importOverlay">
  <div class="dialog-panel import-panel">

    <!-- Header with title and close button -->
    <div class="dialog-header">
      <span class="dialog-title">{{ t('import.title') }}</span>
      <button class="dialog-close" type="button" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 5l10 10M15 5L5 15"/></svg>
      </button>
    </div>

    {% if import_gravatar_enabled and import_url_enabled %}
      <!-- Tab switcher: Gravatar / URL (only shown when both sources are enabled) -->
      <div class="dialog-group">
        <div class="dialog-options">
          <button class="btn dialog-option active" data-import-tab="gravatar" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5.5 21a6.5 6.5 0 0 1 13 0"/></svg>
            {{ t('import.gravatar') }}
          </button>
          <button class="btn dialog-option" data-import-tab="url" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/></svg>
            URL
          </button>
        </div>
      </div>
    {% endif %}

    {% if import_gravatar_enabled %}
      <!-- Gravatar tab: email input + load button -->
      <div class="import-tab" id="importTabGravatar">
        <div class="import-field-row">
          <input id="gravatarEmail" type="email" class="import-input" value="{{ user.email }}" placeholder="{{ t('import.gravatar_placeholder') }}" />
          <button id="gravatarLoadBtn" class="btn btn-import" type="button">{{ t('import.load') }}</button>
        </div>
      </div>
    {% endif %}

    {% if import_url_enabled %}
      <!-- URL tab: URL input + load button -->
      <div class="import-tab{% if import_gravatar_enabled %} hidden{% endif %}" id="importTabUrl">
        <div class="import-field-row">
          <input id="urlInput" type="url" class="import-input" placeholder="{{ t('import.url_placeholder') }}" />
          <button id="urlLoadBtn" class="btn btn-import" type="button">{{ t('import.load') }}</button>
        </div>
      </div>
    {% endif %}

    <!-- Preview area (shown after a successful load) -->
    <div id="importPreview" class="import-preview hidden">
      <img id="importPreviewImg" src="" alt="Preview" />
    </div>

    <!-- Error message (shown on fetch failure) -->
    <p id="importError" class="import-error hidden"></p>

    <!-- Footer with Cancel / OK -->
    <div class="dialog-footer import-footer">
      <button id="importCancelBtn" class="import-cancel" type="button">{{ t('import.cancel') }}</button>
      <button id="importOkBtn" class="btn" type="button" disabled>{{ t('import.ok') }}</button>
    </div>
  </div>
</div>
