<!-- Top navigation bar -->
<nav class="navbar">
  <a class="brand" href="{{ url_for('routes.login_page') }}">
    <img class="brand-logo" src="{{ url_for('static', filename='images/logo.svg') }}" alt="" />
    {{ brand_name }}
  </a>
  <div class="navbar-right">
    {% if user is defined and user %}
      <span class="user-info">
        <form method="post" action="{{ url_for('auth.logout') }}" class="logout-form">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          <button type="submit" class="logout-btn">{{ t('nav.logout') }}</button>
        </form>
      </span>
    {% endif %}
    {% include 'partials/settings-btn.html' %}
  </div>
</nav>

<!-- Settings overlay (outside navbar to escape its stacking context) -->
{% include 'partials/settings.html' %}
