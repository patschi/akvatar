<!DOCTYPE html>
<html lang="{{ lang }}">
{% with page_title=t('title.logged_out') %}
  {% include 'partials/head.html' %}
{% endwith %}
<body>

  {% include 'partials/navbar.html' %}

  <main class="container container--narrow">
    <div class="card login-card">
      <div class="login-hero-wrapper">
        <img class="login-hero" src="{{ url_for('static', filename='images/logo.svg') }}" alt="{{ brand_name }}" />
        <span class="login-hero-badge login-hero-badge--logout">{{ t('title.logged_out') }}</span>
      </div>

      <h1>{{ t('logout.heading') }}</h1>
      <p class="subtitle">{{ t('logout.subtitle') }}</p>

      <a href="{{ url_for('routes.login_page') }}" class="btn btn-login">
        {{ t('logout.button') }}
      </a>
    </div>
  </main>

  <script src="{{ url_for('static', filename='js/settings.js') }}"></script>
</body>
</html>
