<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!--
    Avatar Updater logo
    A rounded-square with a user silhouette and an upload badge.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="40" height="40" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>

  <!-- User silhouette clipped to the rounded rect -->
  <g clip-path="url(#clip)">
    <!-- Head -->
    <circle cx="20" cy="15.5" r="6" fill="rgba(255,255,255,0.92)"/>
    <!-- Shoulders / body -->
    <ellipse cx="20" cy="38" rx="12" ry="10" fill="rgba(255,255,255,0.92)"/>
  </g>

  <!-- Upload badge (green circle with arrow) -->
  <circle cx="31" cy="31" r="7.5" fill="#22c55e" stroke="#4338ca" stroke-width="1.2"/>
  <polyline points="31,27.5 31,34" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <polyline points="28.2,30 31,27.2 33.8,30" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
