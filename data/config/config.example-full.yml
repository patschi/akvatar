# ============================================================================
# Authentik Avatar Updater – Configuration
# ============================================================================

# --- Dry-Run Mode ---
# When enabled, avatar images are still processed and saved to disk, but no
# changes are pushed to Authentik or LDAP.  All operations that would have
# been performed are logged instead.  Useful for testing.
dry_run: false

# --- Branding ---
# Customise the name shown in the browser title bar and navigation header.
branding:
  name: "Avatar Updater"

# --- Application ---
app:
  # Secret key for Flask session management (change to a long random value!)
  # Generate one with:  python3 -c "import secrets; print(secrets.token_hex(32))"
  secret_key: "CHANGE-ME-to-a-random-secret-key"
  # Maximum upload size in megabytes
  max_upload_size_mb: 10
  # Where processed avatars are stored on disk (relative or absolute path)
  avatar_storage_path: "data/user-avatars"
  # Public base URL where the app is reachable.
  # The path component is used to host the app under a subfolder automatically
  # (e.g. "https://portal.example.com/avatar" serves the app under /avatar).
  # Must NOT have a trailing slash.
  # When this URL starts with "https://", the session cookie is automatically
  # marked Secure so browsers only transmit it over HTTPS connections.
  public_base_url: "https://avatar.example.com"
  # Whether to set the Secure flag on the session cookie.
  # null (default): auto-detected from public_base_url — Secure is set when the
  #   URL starts with "https://", which is correct for the vast majority of setups.
  # true / false: explicit override for edge cases where auto-detection is wrong
  #   (e.g. an HTTP-only internal deployment behind a TLS-terminating proxy that
  #   does not forward X-Forwarded-Proto correctly).
  # Do not change this unless you have a specific reason to — auto-detection is
  # correct for all standard deployments.
  session_cookie_secure: null
  # Public base URL where avatar files are accessible (used to build avatar URLs
  # pushed to Authentik/LDAP). Must NOT have a trailing slash.
  public_avatar_url: "https://avatar.example.com/user-avatars"
  # Web session lifetime in seconds.  After this period the session cookie
  # expires and the user must log in again.  Default: 1800 (30 minutes).
  web_session_lifetime_seconds: 1800
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_level: "INFO"
  # Enable full debug mode: activates Flask debugger, forces log level to
  # DEBUG, and enables template auto-reload.  NEVER enable in production.
  debug_full: false

# --- Cleanup ---
cleanup:
  # Cron schedule for the cleanup job.  Uses standard 5-field crontab syntax
  # (minute hour day month weekday).  The scheduler always uses UTC time.
  # Set to "" (empty string) to disable the cleanup job entirely.
  interval: "0 2 * * *"
  # Run cleanup once 60 seconds after application startup (in addition to cron).
  # Cleanup can always be triggered via running `run_cleanup.py` when needed.
  on_startup: false
  # Number of avatar sets to keep per user.  Older uploads beyond this limit
  # are removed by the cleanup job.  Set to 0 to keep all (no retention cleanup).
  avatar_retention_count: 2
  # Remove avatar sets for users that have been deleted from Authentik entirely.
  when_user_deleted: true
  # Remove avatar sets for users that exist in Authentik but are deactivated.
  # Disabled by default so avatars are preserved for temporarily disabled accounts.
  when_user_deactivated: false

# --- Rate Limiting ---
# Throttle avatar and metadata serving endpoints by client IP address to
# prevent URL guessing abuse and ensure fair usage.
# Counters are shared across all gunicorn worker processes, so the effective
# limit per client IP is exactly max_requests per window period.
rate_limiting:
  # Master switch – set to false to disable all rate limiting.
  enabled: false
  # IPs or CIDR ranges that are never rate-limited.
  # Supports individual IPs (e.g. "10.0.0.1") and CIDR notation
  # (e.g. "192.168.0.0/16").  IPv4 and IPv6 are both supported.
  ip_whitelist:
    - "127.0.0.1"
    - "::1"
    # - "10.0.0.0/8"
    # - "192.168.0.0/16"
  # How often (in seconds) stale IP tracking entries are evicted from memory.
  # Lower values reclaim memory sooner; higher values reduce lock contention.
  eviction_interval: 10
  # Per-endpoint-type limits.  Each type can be independently enabled/disabled
  # and configured with its own request count and time window.
  # `enabled` is whatever if the ratelimiting is enabled and active.
  # `requests` is the maximum number of requests allowed per client IP within the time window.
  # `window` is the time window in seconds.
  # Limits for avatar requests
  avatars:
    enabled: true
    requests: 100
    window: 60
  # Limits for metadata requests
  metadata:
    enabled: true
    requests: 50
    window: 60

# --- Webserver ---
# These settings apply when running via run.py / gunicorn (production & Docker).
# When running via app.py (development), only host, port, and TLS are used.
webserver:
  # Enable reverse-proxy support.  When true (default), the ProxyFix middleware
  # reads X-Forwarded-For/Proto/Host/Prefix headers so that url_for() generates
  # correct external URLs and remote_addr reflects the real client IP.
  # Set to false only when running without a reverse proxy (e.g. direct exposure).
  proxy_mode: true
  # Log every HTTP request to console (default: false).
  access_log: false
  # Number of gunicorn worker processes.
  workers: 2
  # Number of threads per worker. Each thread handles one request concurrently.
  threads: 4
  # Worker timeout in seconds. A worker is restarted if it does not respond
  # within this duration. Should be long enough for the slowest request
  # (e.g. large image upload + processing).
  timeout: 120
  # TLS certificate and private key paths for HTTPS.
  # When set, the server uses HTTPS on the same port.
  # Leave empty to run plain HTTP (a warning will be logged at startup).
  tls_cert: ""
  tls_key: ""

# --- OpenID Connect / Authentik Login ---
# Scopes (openid, profile, email) are always requested and cannot be changed.
oidc:
  # Authentik OpenID provider URL (no trailing slash)
  issuer_url: "https://auth.example.com/application/o/avatar-updater"
  client_id: "avatar-updater"
  client_secret: "CHANGE-ME"
  # OIDC claim that carries the unique username
  username_claim: "preferred_username"

# --- Authentik Admin API ---
authentik_api:
  # Authentik base URL (no trailing slash)
  base_url: "https://auth.example.com"
  # API token with permissions to read/write user attributes
  api_token: "CHANGE-ME"
  # Which generated image size (px) to use for the Authentik avatar URL.
  # Must be one of the values in images.sizes below.
  avatar_size: 512
  # Authentik user attribute to store the avatar URL in
  avatar_attribute: "avatar-url"

# --- LDAP Server (optional) ---
# Supports any standards-compliant LDAP server.  Microsoft Active Directory
# is the primary and only tested target.  Adjust search_filter and
# photo_attribute for other directories.
ldap:
  # Set to false to skip LDAP thumbnail updates entirely
  enabled: false
  # LDAP server address
  server: "ldaps://dc.example.com"
  # Port (636 for LDAPS, 389 for LDAP)
  port: 636
  use_ssl: true
  # Skip TLS certificate verification (set to true for self-signed certificates)
  skip_cert_verify: false
  # Bind credentials (service account with write access to the photo attribute)
  bind_dn: "CN=svc-avatar,OU=Service Accounts,DC=example,DC=com"
  bind_password: "CHANGE-ME"
  # Base DN to search for user objects
  search_base: "DC=example,DC=com"
  # LDAP search filter to locate the user.  {ldap_uniq} is replaced with the
  # value of the user's ldap_uniq attribute from Authentik.
  # Default uses objectSid (Microsoft Active Directory).
  search_filter: "(objectSid={ldap_uniq})"
  # Photo attributes to update in LDAP.  Each entry defines one LDAP attribute
  # to write after a successful avatar upload.
  #
  # Fields per entry:
  #   attribute   – LDAP attribute name to write to
  #   type        – "binary" (raw image bytes) or "url" (public URL string)
  #   image_type  – image format: jpg, png, or webp
  #   image_size  – square pixel dimension (e.g. 96 = 96x96)
  #   max_file_size – maximum size in KB (binary only; 0 = unlimited).
  #                   If exceeded, quality is reduced automatically (JPEG/WebP).
  #
  # For "url" type, image_size must be in images.sizes and image_type must be
  # in images.formats below (the URL points to a pre-generated file).
  # For "binary" type, images are generated on-the-fly if no pre-generated file
  # at the exact size/format exists, using the closest larger source image.
  photos:
    - attribute: thumbnailPhoto
      type: binary
      image_type: jpeg
      image_size: 128
      max_file_size: 100
    - attribute: jpegPhoto
      type: binary
      image_type: jpeg
      image_size: 256
      max_file_size: 250

# --- Image Processing ---
images:
  # Sizes to generate (width x height, always square)
  sizes:
    - 1024
    - 648
    - 512
    - 256
    - 128
    - 64
  # Output formats to save for each size
  formats:
    - "jpg"
    - "png"
    - "webp"
  # JPEG / WebP quality (1-100)
  jpeg_quality: 90
  webp_quality: 85
  # PNG compression level (0-9, higher = smaller but slower)
  png_compress_level: 6
