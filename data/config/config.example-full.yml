# ============================================================================
# Authentik Avatar Updater – Configuration
# ============================================================================

# --- Dry-Run Mode ---
# When enabled, avatar images are still processed and saved to disk, but no
# changes are pushed to Authentik or LDAP.  All operations that would have
# been performed are logged instead.  Useful for testing.
dry_run: false

# --- Branding ---
# Customize the name shown in the browser title bar and navigation header.
branding:
  name: "Avatar Updater"

# --- Application ---
app:
  # Maximum upload size in megabytes
  max_upload_size_mb: 10
  # Where processed avatars are stored on disk (relative or absolute path)
  avatar_storage_path: "data/user-avatars"
  # Public base URL where the app is reachable.
  # The path component is used to host the app under a subfolder automatically
  # (e.g. "https://portal.example.com/avatar" serves the app under /avatar).
  # Must NOT have a trailing slash.
  # When this URL starts with "https://", the session cookie is automatically
  # marked Secure so browsers only transmit it over HTTPS connections.
  public_base_url: "https://avatar.example.com"
  # Public base URL where avatar files are accessible (used to build avatar URLs
  # pushed to Authentik/LDAP). Must NOT have a trailing slash.
  public_avatar_url: "https://avatar.example.com/user-avatars"
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_level: "INFO"
  # Enable full debug mode: activates Flask debugger, forces log level to
  # DEBUG, and enables template auto-reload.  NEVER enable in production.
  debug_full: false

# --- Security ---
security:
  # Secret key for Flask session management (change to a long random value!)
  # Generate one with:  python3 -c "import secrets; print(secrets.token_hex(32))"
  secret_key: "CHANGE-ME-to-a-random-secret-key"
  # Whether to set the Secure flag on the session cookie.
  # null (default): auto-detected from app.public_base_url — Secure is set when
  #   the URL starts with "https://", which is correct for the vast majority of setups.
  # true / false: explicit override for edge cases where auto-detection is wrong
  #   (e.g. an HTTP-only internal deployment behind a TLS-terminating proxy that
  #   does not forward X-Forwarded-Proto correctly).
  # Do not change this unless you have a specific reason to — auto-detection is
  # correct for all standard deployments.
  session_cookie_secure: null
  # Web session lifetime in seconds.  After this period the session cookie
  # expires and the user must log in again.  Default: 1800 (30 minutes).
  web_session_lifetime_seconds: 1800
  # Controls who may access avatar metadata JSON files served at
  # /user-avatars/_metadata/<file>.  Metadata files contain the user's
  # Authentik PK and should not be exposed to other users or the public.
  #
  #   owner_only (default): only the authenticated user who owns the file may
  #     access it.  Other authenticated users and unauthenticated visitors both
  #     receive a 404.
  #   public: no authentication is required.  Suitable only when metadata
  #     files are needed by an unauthenticated service and the privacy
  #     implications are acceptable.
  metadata_access: "owner_only"
  # Content Security Policy (CSP) response header.
  # When enabled (default), every HTML response includes a nonce-based CSP
  # header that restricts the origins from which the browser may load scripts,
  # styles, images, and other resources.  The img-src directive automatically
  # includes the origin derived from app.public_avatar_url, so avatars hosted
  # on a separate domain or CDN are not blocked.
  # Set to false only when a reverse proxy or WAF injects its own CSP header
  # and two competing policies cause compatibility problems.
  csp_enabled: true

# --- Cleanup ---
cleanup:
  # Cron schedule for the cleanup job.  Uses standard 5-field crontab syntax
  # (minute hour day month weekday).  The scheduler always uses UTC time.
  # Set to "" (empty string) to disable the cleanup job entirely.
  interval: "0 2 * * *"
  # Run cleanup once 60 seconds after application startup (in addition to cron).
  # Cleanup can always be triggered via running `run_cleanup.py` when needed.
  on_startup: false
  # Number of avatar sets to keep per user.  Older uploads beyond this limit
  # are removed by the cleanup job.  Set to 0 to keep all (no retention cleanup).
  avatar_retention_count: 2
  # Remove avatar sets for users that have been deleted from Authentik entirely.
  when_user_deleted: true
  # Remove avatar sets for users that exist in Authentik but are deactivated.
  # Disabled by default so avatars are preserved for temporarily disabled accounts.
  when_user_deactivated: false

# --- Rate Limiting ---
# Throttle avatar and metadata serving endpoints by client IP address to
# prevent URL guessing abuse and ensure fair usage.
# Counters are shared across all gunicorn worker processes, so the effective
# limit per client IP is exactly max points per window period.
# Each request costs 1 point; a 404 response costs 5 points to penalise
# URL-guessing attempts.
rate_limiting:
  # Master switch – set to false to disable all rate limiting.
  enabled: false
  # IPs or CIDR ranges that are never rate-limited.
  # Supports individual IPs (e.g. "10.0.0.1") and CIDR notation
  # (e.g. "192.168.0.0/16").  IPv4 and IPv6 are both supported.
  ip_whitelist:
    - "127.0.0.1"
    - "::1"
    # - "10.0.0.0/8"
    # - "192.168.0.0/16"
  # Point cost for a 404 (Not Found) response.  Higher values penalise
  # URL-guessing attempts more aggressively.  A normal request costs 1 point.
  points_cost_404: 5
  # How often (in seconds) stale IP tracking entries are evicted from memory.
  # Lower values reclaim memory sooner; higher values reduce lock contention.
  eviction_interval: 10
  # Per-endpoint-type limits.  Each type can be independently enabled/disabled
  # and configured with its own point budget and time window.
  # `enabled` is whether this endpoint type is rate-limited when rate limiting is active.
  # `points` is the maximum number of points allowed per client IP within the time window.
  # `window` is the time window in seconds.
  # Limits for avatar requests
  avatars:
    enabled: true
    points: 100
    window: 60
  # Limits for metadata requests
  metadata:
    enabled: true
    points: 50
    window: 60

# --- Webserver ---
# These settings apply when running via run.py / gunicorn (production & Docker).
# When running via app.py (development), only host, port, and TLS are used.
webserver:
  # Enable reverse-proxy support.  When true (default), the ProxyFix middleware
  # reads X-Forwarded-For/Proto/Host/Prefix headers so that url_for() generates
  # correct external URLs and remote_addr reflects the real client IP.
  # Set to false only when running without a reverse proxy (e.g. direct exposure).
  proxy_mode: true
  # Restrict which Host header values the application will accept.
  # Requests with a Host header not in this list are rejected with HTTP 400.
  # Protects against HTTP host-header injection attacks.
  # Leave null (default) or omit to allow any Host header (no restriction).
  # Each entry is a plain hostname (port is always ignored during the check).
  # Prefix an entry with "." to match all subdomains (e.g. ".example.com").
  trusted_hosts: null
  # Log every HTTP request to console (default: false).
  access_log: false
  # Number of gunicorn worker processes.
  workers: 2
  # Number of threads per worker. Each thread handles one request concurrently.
  threads: 4
  # Worker timeout in seconds. A worker is restarted if it does not respond
  # within this duration. Should be long enough for the slowest request
  # (e.g. large image upload + processing).
  timeout: 120
  # TLS certificate and private key paths for HTTPS.
  # When set, the server uses HTTPS on the same port.
  # Leave empty to run plain HTTP (a warning will be logged at startup).
  tls:
    cert: ""
    key: ""
    # Minimum TLS protocol version the server will accept.
    # The value must match a member name of Python's ssl.TLSVersion enum.
    # Supported values (as of Python 3.7+): TLSv1_2, TLSv1_3
    # (TLSv1 and TLSv1_1 are deprecated and disabled in most Python builds.)
    # Future TLS versions are supported automatically as Python adds them.
    # Application refuses to start if an unrecognized value is provided.
    # Has no effect when cert and key are not set.
    min_version: TLSv1_2
  # HTTP/2 support.  Requires tls.cert and tls.key to be configured.
  # Has no effect when running over plain HTTP.
  http2:
    # Enable HTTP/2 (h2) via on TLS connections.
    # When enabled (default), gunicorn advertises h2 alongside http/1.1 during
    # the TLS handshake so clients that support HTTP/2 can use it automatically.
    # When disabled, it is restricted to http/1.1 only.
    enabled: true

# --- OpenID Connect / Authentik Login ---
# Scopes (openid, profile, email) are always requested and cannot be changed.
oidc:
  # Authentik OpenID provider URL (no trailing slash)
  issuer_url: "https://auth.example.com/application/o/avatar-updater"
  client_id: "avatar-updater"
  client_secret: "CHANGE-ME"
  # OIDC claim that carries the unique username
  username_claim: "preferred_username"
  # When true, logging out also terminates the Authentik SSO session via
  # RP-Initiated Logout (OIDC end_session_endpoint). This logs the user out
  # of ALL applications using that Authentik session, not just this app.
  # When false, only the local app session is cleared.
  # If enabled, the post-logout redirect URI must be registered in Authentik.
  # See docs/authentik-oidc-setup.md for details.
  end_provider_session: false

# --- Authentik Admin API ---
authentik:
  # Authentik base URL (no trailing slash)
  base_url: "https://auth.example.com"
  # API token with permissions to read/write user attributes
  api_token: "CHANGE-ME"
  # Which generated image size (px) to use for the Authentik avatar URL.
  # Must be one of the values in images.sizes below.
  avatar_size: 512
  # Authentik user attribute to store the avatar URL in
  avatar_attribute: "avatar-url"

# --- LDAP Server (optional) ---
# Supports any standards-compliant LDAP server.  Microsoft Active Directory
# is the primary and only tested target.  Adjust search_filter and
# photo_attribute for other directories.
ldap:
  # Set to false to skip LDAP thumbnail updates entirely
  enabled: false
  # LDAP server address(es), comma-separated.  Servers are tried in the
  # order listed; the next server is used when a connection or bind fails.
  # Port and SSL/TLS can be specified per URL (ldaps:// enables SSL;
  # a :port suffix overrides the port setting below).  Examples:
  #   Single:        "ldaps://dc.example.com"
  #   Failover:      "ldaps://dc1.example.com,ldaps://dc2.example.com"
  #   Mixed ports:   "ldaps://dc1.example.com:636,ldap://dc2.example.com:389"
  servers: "ldaps://dc1.example.com,ldaps://dc2.example.com"
  # Fallback port when not specified in the URL (636 for LDAPS, 389 for LDAP)
  port: 636
  use_ssl: true
  # Skip TLS certificate verification (set to true for self-signed certificates)
  skip_cert_verify: false
  # Bind credentials (service account with write access to the photo attribute)
  bind_dn: "CN=svc-avatar,OU=Service Accounts,DC=example,DC=com"
  bind_password: "CHANGE-ME"
  # Base DN to search for user objects
  search_base: "DC=example,DC=com"
  # LDAP search filter to locate the user.  {ldap_uniq} is replaced with the
  # value of the user's ldap_uniq attribute from Authentik.
  # Default uses objectSid (Microsoft Active Directory).
  search_filter: "(objectSid={ldap_uniq})"
  # Photo attributes to update in LDAP.  Each entry defines one LDAP attribute
  # to write after a successful avatar upload.
  #
  # Fields per entry:
  #   attribute   – LDAP attribute name to write to
  #   type        – "binary" (raw image bytes) or "url" (public URL string)
  #   image_type  – image format: jpg, png, or webp
  #   image_size  – square pixel dimension (e.g. 96 = 96x96)
  #   max_file_size – maximum size in KB (binary only; 0 = unlimited).
  #                   If exceeded, quality is reduced automatically (JPEG/WebP).
  #
  # For "url" type, image_size must be in images.sizes and image_type must be
  # in images.formats below (the URL points to a pre-generated file).
  # For "binary" type, images are generated on-the-fly if no pre-generated file
  # at the exact size/format exists, using the closest larger source image.
  photos:
    - attribute: thumbnailPhoto
      type: binary
      image_type: jpeg
      image_size: 128
      max_file_size: 100
    - attribute: jpegPhoto
      type: binary
      image_type: jpeg
      image_size: 256
      max_file_size: 250

# --- Image Import (External Sources) ---
# Controls whether users can import images from external sources (Gravatar,
# remote URL) instead of uploading a file directly.
image_import:
  # Gravatar import: fetch avatar by email address from gravatar.com
  gravatar:
    # Set to false to hide the Gravatar import option from the UI
    enabled: true
    # When true, the email input is replaced by a read-only display of the
    # session user's registered email.  Users cannot enter a different address.
    # The server also enforces this: requests with a mismatching email are
    # rejected with HTTP 403.  Prevents the Gravatar endpoint from being used
    # as an existence oracle for arbitrary email addresses.
    restrict_email: true
  # URL import: fetch an image from any user-provided URL
  url:
    # Set to false to hide the URL import option from the UI
    enabled: true
    # Block URLs that resolve to private or internal IP addresses (SSRF
    # protection).  Prevents users from using the server as a proxy to
    # access internal services (e.g. 127.0.0.1, 10.x, 192.168.x, etc.).
    restrict_private_ips: true
  # Webcam import: capture a selfie via the browser's MediaDevices API.
  # Capturing happens entirely client-side (no server endpoint is involved).
  # Enabling this flips the Permissions-Policy header from "camera=()" to
  # "camera=(self)", which is required for getUserMedia() to work at all.
  # Browsers only grant camera access on secure origins, so the app must be
  # served over HTTPS (or accessed via http://localhost during development).
  webcam:
    # Set to false to hide the Webcam import option from the UI
    enabled: true

# --- Image Processing ---
images:
  # Sizes to generate (width x height, always square)
  sizes:
    - 1024
    - 648
    - 512
    - 256
    - 128
    - 64
  # Output formats to save for each size
  formats:
    - "jpg"
    - "png"
    - "webp"
  # JPEG / WebP quality (1-100)
  jpeg_quality: 90
  webp_quality: 85
  # PNG compression level (0-9, higher = smaller but slower)
  png_compress_level: 6

# --- Sentry Error Tracking (optional) ---
# Sends unhandled exceptions and (optionally) performance data to Sentry.
# Requires a valid DSN from your Sentry project settings.
sentry:
  # Master switch – set to true to enable Sentry integration
  enabled: false
  # Sentry DSN (Data Source Name) – project-specific ingest URL from Sentry
  dsn: ""
  # Capture unhandled exceptions and send them to Sentry
  capture_errors: true
  # Capture performance / transaction traces
  capture_performance: false
  # Sample rate for error events (0.0 to 1.0, where 1.0 = send every error)
  sample_rate: 1.0
  # Sample rate for performance traces (0.0 to 1.0, where 1.0 = trace every request).
  # Only applies when capture_performance is true.
  traces_sample_rate: 0.2
  # Sentry environment tag (e.g. "production", "staging", "development").
  # Leave empty to auto-detect from debug_full (debug_full=true -> "development", otherwise "production").
  environment: ""
  # Send default PII (IP addresses, user details) with events.
  # When false, Sentry scrubs personally identifiable information automatically.
  send_default_pii: false
